# AI 每日情报 — 云端定时生成(阶段3)
# 已转正(2026-06-14):写到 main(线上站源)。Cowork 生成任务需关闭以免双写冲突。
name: daily-digest

on:
  workflow_dispatch:        # 手动触发(测试用)
    inputs:
      target_branch:
        description: '推送目标分支。测试时填测试分支(如 actions-test),切勿填 main。留空=main。'
        default: 'main'
        required: false
  schedule:
    - cron: '0 1 * * *'    # UTC 01:00 = 北京 09:00(主班;实际会延迟 3-15 分钟,正常)
    - cron: '17 2 * * *'   # UTC 02:17 = 北京 10:17(备份1:GitHub 常把整点班次延迟/丢弃,错峰补一刀)
    - cron: '17 3 * * *'   # UTC 03:17 = 北京 11:17(备份2:再兜一次,三班全丢概率极低)

# cron 不传 inputs → 回落 main(生产行为不变);手动触发可指定测试分支,保护 main。
env:
  TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'main' }}

permissions:
  contents: write

# 备份班次防并发:同一时刻只允许一个 run。主班若延迟仍在跑,备份会排队等它跑完,
# 然后看到 posts/<date>.json 已存在就跳过,不会重复生成/重复推送/重复烧 token。
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 判断是否需要生成(备份班次防重复)
        id: guard
        run: |
          DATE=$(TZ=Asia/Shanghai date +%F)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          # 手动触发(workflow_dispatch)无条件生成;定时(schedule)仅当今天还没数据时才跑。
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动触发 → 生成"; echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ -f "posts/$DATE.json" ]; then
            echo "今天($DATE)已有数据 → 跳过(备份班次防重复)"; echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "今天($DATE)无数据 → 生成"; echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成摘要
        if: steps.guard.outputs.should_run == 'true'
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PYTHONUNBUFFERED: "1"
          FETCH_OGIMAGE: "1"        # 对入选但缺图的条目补抓 og:image(配图是核心需求)
          OGIMAGE_LIMIT: "40"       # 25→40:条目变多,配图兜底上限同步抬
          # 中等扩量(用户拍板,接受月成本升至 ¥40-70):把候选池做大,供给足的类目自然涨
          RSS_PER_FEED_CAP: "20"    # 12→20:每源抓更多
          RSS_RECENT_DAYS: "10"     # 7→10:时间窗放宽
          HN_MIN_POINTS: "15"       # 30→15:纳入更多社区热帖
        run: python scripts/generate_digest.py

      - name: 提交推送
        if: steps.guard.outputs.should_run == 'true'
        run: |
          git config user.name "AI Daily Agent (Actions)"
          git config user.email "actions@users.noreply.github.com"
          git add posts/
          git diff --cached --quiet && { echo "无变更,跳过提交"; exit 0; }
          # 日期用生成脚本导出的 DIGEST_DATE(与内容/文件名同一来源);未导出才回退实时取。
          # 防跨午夜错位:8 分钟生成若跨午夜,提交步骤自取 date 会比内容晚一天(Run#17)。
          DIGEST_DATE="${DIGEST_DATE:-$(TZ=Asia/Shanghai date +%F)}"
          git commit -m "auto: 每日摘要 $DIGEST_DATE [Actions]"
          if [ "$TARGET_BRANCH" = "main" ]; then
            git push origin HEAD:main                       # 生产:普通推送,绝不强推
          else
            git push -f origin HEAD:"$TARGET_BRANCH"         # 测试分支:可强推,免非快进失败
          fi
