# AI 每日情报 — 云端定时生成(阶段3)
# 已转正(2026-06-14):写到 main(线上站源)。Cowork 生成任务需关闭以免双写冲突。
name: daily-digest

on:
  workflow_dispatch:        # 手动触发(测试用)
    inputs:
      target_branch:
        description: '推送目标分支。测试时填测试分支(如 actions-test),切勿填 main。留空=main。'
        default: 'main'
        required: false
  schedule:
    - cron: '0 1 * * *'    # UTC 01:00 = 北京 09:00(实际会延迟 3-15 分钟,正常)

# cron 不传 inputs → 回落 main(生产行为不变);手动触发可指定测试分支,保护 main。
env:
  TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'main' }}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 生成摘要
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/generate_digest.py

      - name: 提交推送
        run: |
          git config user.name "AI Daily Agent (Actions)"
          git config user.email "actions@users.noreply.github.com"
          git add posts/
          git diff --cached --quiet && { echo "无变更,跳过提交"; exit 0; }
          git commit -m "auto: 每日摘要 $(TZ=Asia/Shanghai date +%F) [Actions]"
          if [ "$TARGET_BRANCH" = "main" ]; then
            git push origin HEAD:main                       # 生产:普通推送,绝不强推
          else
            git push -f origin HEAD:"$TARGET_BRANCH"         # 测试分支:可强推,免非快进失败
          fi
